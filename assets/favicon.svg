<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="VGP">
  <!-- Favicon: the illuminated drop cap's serif "V" with its rope crossbar, flattened to a
       clean cream silhouette on a warm-charcoal tile so it stays legible at favicon sizes.
       The rope's twist is suggested by diagonal grooves that fade to a plain bar when tiny. -->
  <rect width="100" height="100" rx="20" fill="#23262b"/>
  <g fill="#f4f1e8">
    <path d="M24,24 L40,24 L50,58 L60,24 L76,24 L53,83 L47,83 Z"/>
    <rect x="15" y="16" width="28" height="8" rx="1.5"/>
    <rect x="57" y="16" width="28" height="8" rx="1.5"/>
  </g>
  <!-- rope crossbar, drawn over the V -->
  <defs><clipPath id="rope"><rect x="29" y="39" width="42" height="8.5" rx="4.25"/></clipPath></defs>
  <rect x="29" y="39" width="42" height="8.5" rx="4.25" fill="#f4f1e8"/>
  <g clip-path="url(#rope)" stroke="#23262b" stroke-width="1.6" stroke-linecap="round">
    <path d="M32 49 L37 37.5"/>
    <path d="M38 49 L43 37.5"/>
    <path d="M44 49 L49 37.5"/>
    <path d="M50 49 L55 37.5"/>
    <path d="M56 49 L61 37.5"/>
    <path d="M62 49 L67 37.5"/>
  </g>
</svg>
